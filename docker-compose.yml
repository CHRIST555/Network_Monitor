version: "3.9"

# ============================================================
#  Host Monitor — docker-compose.yml
#
#  QUICK START:
#    1. Copy your cert files into ./certs/
#         certs/server.crt   (full chain)
#         certs/server.key   (private key)
#    2. docker compose up -d --build
#    3. Open https://your-domain.com
#    4. Go to Hosts tab → Add Host
#    5. Go to ⚙ Settings to set ping interval & SMTP alerts
# ============================================================

services:

  backend:
    build: ./backend
    container_name: network-monitor-api
    restart: unless-stopped
    environment:
      DATA_DIR: /data
    volumes:
      - network-monitor-data:/data
    expose:
      - "5000"
    # NET_RAW is required so the container can send ICMP ping packets
    cap_add:
      - NET_RAW
    networks:
      - monitor-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: network-monitor-ui
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - backend
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  network-monitor-data:
    driver: local
