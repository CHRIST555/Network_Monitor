version: "3.9"

services:

  backend:
    build: ./backend
    container_name: network-monitor-api
    restart: unless-stopped
    environment:
      DATA_DIR: /data
    volumes:
      - network-monitor-data:/data
    expose:
      - "5000"
    cap_add:
      - NET_RAW
    networks:
      - monitor-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: network-monitor-ui
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - backend
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  network-monitor-data:
    driver: local
